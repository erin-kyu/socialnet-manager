<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialNet Manager</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Bootstrap 5.3 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
  <!-- Custom styles (must come AFTER Bootstrap CDN) -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase JS client via CDN (must load before app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ===== APPLICATION TITLE HEADER ===== -->
  <header id="app-header">
    <h1 id="app-title">LBYCPG3 SocialNet App - Profile Manager</h1>
  </header>

  <!-- Main content: three equal panels -->
  <div id="app-wrapper">
    <main class="container-fluid flex-grow-1 py-3">
      <div class="row g-3 h-100">

        <!-- ===== LEFT PANEL: Profile Management ===== -->
        <div class="col-12 col-md-4">
          <div class="sn-panel">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Profile Management</h6>

            <!-- Add Profile -->
            <label for="input-name" class="form-label fw-semibold small">Name</label>
            <div class="input-group mb-2">
              <input type="text" id="input-name" class="form-control form-control-sm"
                     placeholder="Enter full name">
              <button id="btn-add" class="btn btn-primary btn-sm">Add</button>
            </div>

            <!-- Look Up Profile -->
            <label for="input-lookup" class="form-label fw-semibold small">Look Up</label>
            <div class="input-group mb-2">
              <input type="text" id="input-lookup" class="form-control form-control-sm"
                     placeholder="Enter profile name">
              <button id="btn-lookup" class="btn btn-secondary btn-sm">Search</button>
            </div>

            <!-- Delete Profile -->
            <button id="btn-delete" class="btn btn-danger btn-sm w-100 mb-3">
              Delete Selected Profile
            </button>

            <!-- Profile List -->
            <p class="small fw-semibold text-muted mb-1">Profiles</p>
            <div id="profile-list" class="profile-list-box">
              <!-- Populated dynamically by JavaScript -->
            </div>
          </div>
        </div>

        <!-- ===== CENTER PANEL: Profile Information ===== -->
        <div class="col-12 col-md-4">
          <div class="sn-panel text-center">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Profile Information</h6>

            <!-- Profile picture -->
            <img id="profile-pic"
                 src="resources/default.png"
                 alt="Profile picture"
                 class="profile-thumb" />

            <!-- Name -->
            <h4 id="profile-name" class="profile-hero-name">No Profile Selected</h4>

            <!-- Current Status -->
            <div id="profile-status" class="sn-textbox mb-3">&mdash;</div>

            <!-- Favorite quote -->
            <div id="profile-quote" class="sn-textbox mb-3">&mdash;</div>

            <!-- Friends list -->
            <p class="small fw-semibold text-start text-muted mb-1">Friends</p>
            <div id="friends-list" class="sn-textbox sn-textbox--tall">
              <!-- Populated dynamically by JavaScript -->
            </div>
          </div>
        </div>

        <!-- ===== RIGHT PANEL: Edit Profile ===== -->
        <div class="col-12 col-md-4">
          <div class="sn-panel">
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">Edit Profile</h6>

            <!-- Change Status -->
            <label class="form-label fw-semibold small">Change Status</label>
            <div class="input-group mb-3">
              <input type="text" id="input-status" class="form-control form-control-sm"
                     placeholder="New status message">
              <button id="btn-status" class="btn btn-primary btn-sm">Change</button>
            </div>

            <!-- Change Picture -->
            <label class="form-label fw-semibold small">Change Picture</label>
            <div class="input-group mb-3">
              <input type="text" id="input-picture" class="form-control form-control-sm"
                     placeholder="e.g. resources/ada.png">
              <button id="btn-picture" class="btn btn-primary btn-sm">Update Picture</button>
            </div>

            <!-- Add Friend -->
            <label class="form-label fw-semibold small">Add Friend</label>
            <div class="input-group mb-3">
              <input type="text" id="input-friend" class="form-control form-control-sm"
                     placeholder="Friend's full name">
              <button id="btn-add-friend" class="btn btn-success btn-sm">Add Friend</button>
            </div>

            <!-- Remove Friend -->
            <label class="form-label fw-semibold small">Remove Friend</label>
            <div class="input-group mb-3">
              <input type="text" id="input-remove-friend" class="form-control form-control-sm"
                     placeholder="Friend's full name">
              <button id="btn-remove-friend" class="btn btn-warning btn-sm">Remove</button>
            </div>

          </div>
        </div>

      </div><!-- /.row -->
    </main>

    <!-- STATUS BAR: always at the bottom of the page -->
    <footer id="status-bar">
      <span id="status-message">Ready. Select a profile from the list.</span>
    </footer>

  </div><!-- /#app-wrapper -->

  <!-- Bootstrap JS bundle via CDN (Popper.js included) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
          crossorigin="anonymous"></script>
  <!-- Application logic (must come AFTER Bootstrap JS and Supabase CDN) -->
  <script src="js/app.js"></script>
</body>
</html>
